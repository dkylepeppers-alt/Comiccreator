name: 'Setup Node.js Environment'
description: 'Checkout repository, setup Node.js 22 with npm cache, and install dependencies'

inputs:
  fetch-depth:
    description: 'Number of commits to fetch (0 for all history)'
    required: false
    default: '1'

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash
