name: 'Setup Node.js Environment'
description: 'Setup Node.js 22 with npm cache and install dependencies'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash
