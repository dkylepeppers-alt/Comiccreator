version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    # "/" only covers .github/workflows — the composite actions pin their own
    # action SHAs (e.g. actions/setup-node) and must be listed explicitly,
    # otherwise those pins silently go stale (Node 20 runtime deprecation).
    directories:
      - "/"
      - "/.github/actions/setup-node-env"
      - "/.github/actions/setup-playwright"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
