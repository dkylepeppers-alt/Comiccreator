name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  node-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Node.js Environment
        uses: ./.github/actions/setup-node-env

      - name: Syntax check
        run: npm run check-syntax

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
