name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  node-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check-syntax

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
