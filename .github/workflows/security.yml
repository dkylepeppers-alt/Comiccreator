name: Security Audit

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Node.js Environment
        uses: ./.github/actions/setup-node-env

      - name: Run npm audit
        run: npm audit --audit-level=high
