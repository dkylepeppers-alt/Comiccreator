name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'

# Deny all permissions by default; grant only what each job needs.
permissions: {}

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9.1.0
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had any activity for 30 days. It will be closed in 7 days if no
            further activity occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had any activity for 30 days. It will be closed in 7 days if
            no further activity occurs.
          exempt-issue-labels: pinned,security,enhancement
          exempt-pr-labels: pinned,security,enhancement
