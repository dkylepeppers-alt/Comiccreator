name: Seedream Output Order Contract Test

on:
  workflow_dispatch:
    inputs:
      confirm_live_api_charge:
        description: 'I understand this sends paid live NanoGPT image requests'
        required: true
        default: false
        type: boolean
      runs:
        description: 'Number of sequential requests (start with 1; maximum 3)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'

# The live API key is available only after the protected environment is approved.
permissions: {}

concurrency:
  group: seedream-output-order-contract-test
  cancel-in-progress: false

jobs:
  capture-ordered-images:
    if: ${{ inputs.confirm_live_api_charge }}
    environment:
      name: nanogpt-live-test
      deployment: false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      NANOGPT_API_KEY: ${{ secrets.NANOGPT_API_KEY }}
      SEEDREAM_TEST_RUNS: ${{ inputs.runs }}
      SEEDREAM_OUTPUT_DIR: artifacts/seedream-order-test

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Capture indexed Seedream outputs
        run: node scripts/seedream-order-contract-test.mjs

      - name: Upload visual-review artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: seedream-order-contract-${{ github.run_id }}
          path: artifacts/seedream-order-test/
          if-no-files-found: warn
          retention-days: 7
