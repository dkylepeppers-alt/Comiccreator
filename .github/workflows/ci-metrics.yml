name: CI Metrics

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

# Deny all permissions by default; grant only what each job needs.
permissions: {}

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    timeout-minutes: 5
    steps:
      - name: Collect CI metrics
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const workflows = ['tests.yml', 'playwright.yml'];
            const lines = [];

            for (const wf of workflows) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: wf,
                per_page: 20,
                status: 'completed',
              });

              const allRuns = runs.data.workflow_runs;
              if (allRuns.length === 0) {
                lines.push(`### ${wf}\nNo completed runs found.\n`);
                continue;
              }

              const succeeded = allRuns.filter(r => r.conclusion === 'success').length;
              const failed = allRuns.filter(r => r.conclusion === 'failure').length;
              const other = allRuns.length - succeeded - failed;

              const durations = allRuns.map(r => {
                const start = new Date(r.run_started_at);
                const end = new Date(r.updated_at);
                return (end - start) / 1000;
              });

              const avg = durations.reduce((a, b) => a + b, 0) / durations.length;
              const min = Math.min(...durations);
              const max = Math.max(...durations);

              lines.push(`### ${wf}`);
              lines.push(`- Completed runs analyzed: ${allRuns.length}`);
              lines.push(`- ✅ Succeeded: ${succeeded} · ❌ Failed: ${failed} · ⚠️ Other: ${other}`);
              lines.push(`- Average duration: ${(avg / 60).toFixed(1)} min`);
              lines.push(`- Min duration: ${(min / 60).toFixed(1)} min`);
              lines.push(`- Max duration: ${(max / 60).toFixed(1)} min`);
              lines.push('');
            }

            const summary = `# CI Metrics Report\n\n${lines.join('\n')}`;
            core.summary.addRaw(summary);
            await core.summary.write();
