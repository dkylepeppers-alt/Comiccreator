name: Deploy to GitHub Pages

# Runs after the Post-Merge Pipeline (version bump + docs) completes, so the
# deployed site includes the bump commit. A plain push trigger would race the
# bump: pushes made with GITHUB_TOKEN don't start workflows, leaving Pages
# permanently one version-bump commit behind the repo.
on:
  workflow_run:
    workflows: ['Post-Merge Pipeline']
    types: [completed]
  workflow_dispatch:

# Exception: deploy-pages requires top-level permissions because the
# GitHub Pages deployment environment needs id-token and pages write
# access granted at the workflow level, not just the job level.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Deploy the branch tip, not the workflow_run head SHA — the tip
          # includes the version-bump commit pushed by post-merge. Resolved
          # dynamically so a default-branch rename can't strand this workflow.
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}

      - name: Setup Node.js Environment
        uses: ./.github/actions/setup-node-env

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
