<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Open this file in a browser to generate PNG icons, then right-click to save them.</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const scale = s / 512;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#4c1d95');
  grad.addColorStop(1, '#7c3aed');
  ctx.fillStyle = grad;
  roundRect(ctx, 0, 0, s, s, 80 * scale);
  ctx.fill();

  // White comic page
  ctx.fillStyle = '#fff';
  roundRect(ctx, 72*scale, 64*scale, 368*scale, 384*scale, 16*scale);
  ctx.fill();
  ctx.strokeStyle = '#1a1a3e';
  ctx.lineWidth = 10 * scale;
  roundRect(ctx, 72*scale, 64*scale, 368*scale, 384*scale, 16*scale);
  ctx.stroke();

  // Panel dividers
  ctx.strokeStyle = '#1a1a3e';
  ctx.lineWidth = 8 * scale;
  ctx.beginPath();
  ctx.moveTo(72*scale, 268*scale);
  ctx.lineTo(440*scale, 268*scale);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(256*scale, 64*scale);
  ctx.lineTo(256*scale, 268*scale);
  ctx.stroke();

  // Top-left panel: Lightning bolt
  ctx.fillStyle = '#fbbf24';
  ctx.strokeStyle = '#d97706';
  ctx.lineWidth = 6 * scale;
  ctx.beginPath();
  ctx.moveTo(190*scale, 80*scale);
  ctx.lineTo(148*scale, 176*scale);
  ctx.lineTo(176*scale, 176*scale);
  ctx.lineTo(136*scale, 260*scale);
  ctx.lineTo(205*scale, 168*scale);
  ctx.lineTo(175*scale, 168*scale);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Top-right panel: "AI" text
  ctx.fillStyle = '#6d28d9';
  ctx.font = `bold ${80*scale}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('AI', 348*scale, 188*scale);

  // Bottom panel: POW! starburst polygon
  const pts = [
    [256,280],[273,319],[313,303],[297,343],[336,360],
    [297,377],[313,417],[273,401],[256,440],[239,401],
    [199,417],[215,377],[176,360],[215,343],[199,303],[239,319]
  ];
  ctx.fillStyle = '#fbbf24';
  ctx.strokeStyle = '#d97706';
  ctx.lineWidth = 5 * scale;
  ctx.beginPath();
  ctx.moveTo(pts[0][0]*scale, pts[0][1]*scale);
  for (let i = 1; i < pts.length; i++) {
    ctx.lineTo(pts[i][0]*scale, pts[i][1]*scale);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // POW! text
  ctx.fillStyle = '#1a1a3e';
  ctx.font = `bold ${46*scale}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('POW!', 256*scale, 375*scale);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Auto-download
['c192','c512'].forEach(id => {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  link.download = `icon-${canvas.width}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});
</script>
</body>
</html>
