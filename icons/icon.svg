<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Comic page -->
  <rect x="72" y="64" width="368" height="384" rx="16" fill="#fff" stroke="#1a1a3e" stroke-width="10"/>
  <!-- Panel dividers -->
  <line x1="72" y1="268" x2="440" y2="268" stroke="#1a1a3e" stroke-width="8"/>
  <line x1="256" y1="64" x2="256" y2="268" stroke="#1a1a3e" stroke-width="8"/>
  <!-- Top-left panel: Lightning bolt (AI spark) -->
  <path d="M190 80 L148 176 L176 176 L136 260 L205 168 L175 168 Z"
        fill="#fbbf24" stroke="#d97706" stroke-width="6"/>
  <!-- Top-right panel: Bold "AI" text -->
  <text x="348" y="188" text-anchor="middle"
        font-size="80" font-weight="bold" fill="#6d28d9"
        font-family="Arial,sans-serif">AI</text>
  <!-- Bottom panel: POW! starburst -->
  <polygon points="256,280 273,319 313,303 297,343 336,360 297,377 313,417 273,401 256,440 239,401 199,417 215,377 176,360 215,343 199,303 239,319"
           fill="#fbbf24" stroke="#d97706" stroke-width="5"/>
  <text x="256" y="375" text-anchor="middle"
        font-size="46" font-weight="bold" fill="#1a1a3e"
        font-family="Arial,sans-serif">POW!</text>
</svg>
