<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Comic book shape -->
  <rect x="96" y="80" width="320" height="352" rx="16" fill="#fff" opacity="0.95"/>
  <rect x="112" y="96" width="288" height="320" rx="8" fill="none" stroke="#1a1a3e" stroke-width="6"/>
  <!-- Panel dividers -->
  <line x1="256" y1="96" x2="256" y2="256" stroke="#1a1a3e" stroke-width="4"/>
  <line x1="112" y1="256" x2="400" y2="256" stroke="#1a1a3e" stroke-width="4"/>
  <!-- Star/spark -->
  <circle cx="184" cy="176" r="32" fill="#7c3aed" opacity="0.2"/>
  <text x="184" y="188" text-anchor="middle" font-size="40" fill="#7c3aed">&#9733;</text>
  <!-- AI text -->
  <text x="328" y="192" text-anchor="middle" font-size="48" font-weight="bold" fill="#7c3aed" font-family="sans-serif">AI</text>
  <!-- Speech bubble hint -->
  <ellipse cx="184" cy="336" rx="56" ry="32" fill="#fffde7" stroke="#1a1a3e" stroke-width="3"/>
  <text x="184" y="344" text-anchor="middle" font-size="28" fill="#1a1a3e" font-family="sans-serif">...</text>
  <text x="328" y="344" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a3e" font-family="sans-serif">POW!</text>
</svg>
